name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            airflow-version: "2.10.5"
          - python-version: "3.11"
            airflow-version: "2.11.2"
          - python-version: "3.11"
            airflow-version: "3.1.3"
          - python-version: "3.12"
            airflow-version: "3.2.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${{ matrix.airflow-version }}/constraints-${{ matrix.python-version }}.txt"
          python -m pip install --constraint "${CONSTRAINT_URL}" -e ".[dev]" "apache-airflow==${{ matrix.airflow-version }}"

      - name: Run tests
        run: python -m pytest -q tests

      - name: Initialize Airflow DB
        env:
          AIRFLOW_HOME: ${{ runner.temp }}/airflow-home
          AIRFLOW__CORE__DAGS_FOLDER: ${{ runner.temp }}/dags
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:///${{ runner.temp }}/airflow.db
        run: |
          mkdir -p "${AIRFLOW_HOME}" "${AIRFLOW__CORE__DAGS_FOLDER}"
          airflow db migrate

      - name: Run Airflow runtime smoke
        env:
          AIRFLOW_HOME: ${{ runner.temp }}/airflow-home
          AIRFLOW__CORE__DAGS_FOLDER: ${{ runner.temp }}/dags
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:///${{ runner.temp }}/airflow.db
        run: python tests/smoke_airflow_runtime.py

      - name: Build package
        if: matrix.airflow-version == '3.2.1'
        run: |
          python -m pip install build
          python -m build
